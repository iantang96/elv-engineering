<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWE PA Project Form | TRINITY</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00BFA5; --secondary: #2D3436; --bg: #f4f7f6; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .form-card { max-width: 500px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--secondary); color: white; padding: 25px; text-align: center; border-bottom: 5px solid var(--primary); }
        .header h2 { margin: 0; font-size: 1.3rem; letter-spacing: 1px; }
        .header p { margin: 8px 0 0; font-size: 0.85rem; opacity: 0.8; }
        .content { padding: 25px; }
        .section-title { background: #e0f7f4; color: var(--primary); padding: 8px 12px; font-weight: bold; border-left: 4px solid var(--primary); margin: 20px 0 15px; }
        .field { margin-bottom: 18px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; }
        input[type="text"], select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        .checkbox-group { display: flex; flex-direction: column; gap: 10px; }
        .check-item { display: flex; align-items: center; padding: 12px; border: 1px solid #eee; border-radius: 8px; cursor: pointer; }
        input[type="checkbox"] { width: 22px; height: 22px; margin-right: 12px; accent-color: var(--primary); }
        .file-btn { background: #f8f9fa; border: 2px dashed var(--primary); padding: 20px; text-align: center; cursor: pointer; border-radius: 8px; color: var(--primary); font-weight: bold; margin-bottom: 10px; }
        .preview-img { width: 100%; border-radius: 8px; display: none; margin-top: 10px; border: 2px solid var(--primary); }
        .btn-submit { background: var(--primary); color: white; width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
        .btn-submit:hover:not(:disabled) { background: #00897B; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="form-card">
    <div class="header">
        <h2>AWE PA System (CO20/25)</h2>
        <p>TRINITY TECHNOLOGY SOLUTIONS LTD</p>
    </div>

    <div class="content">
        <div class="field">
